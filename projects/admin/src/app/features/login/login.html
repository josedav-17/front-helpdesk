<div class="login-screen">
  <div class="login-box">
    
    <div class="login-header">
      <div class="brand-container">
        <img src="assets/Logo-IU-Digital.png" alt="IU Digital" class="brand-logo">
      </div>
      <h1>Helpdesk</h1>
      <p>Panel Administrativo</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      
      <div class="form-group">
        <label>Usuario</label>
        <div class="input-control">
          <input type="text" formControlName="user" placeholder="Ingresa tu usuario">
          <span class="material-icons-outlined icon-suffix">person</span>
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-control">
          <input [type]="hide ? 'password' : 'text'" formControlName="pass" placeholder="••••••••">
          <span 
            class="material-icons-outlined icon-suffix" 
            (click)="hide = !hide" 
            style="cursor: pointer;">
            {{hide ? 'visibility_off' : 'visibility'}}
          </span>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="form.invalid">
        Entrar al Sistema
      </button>

      <div class="demo-tag">
        Developers: <b>Daniela Lozano - josedav-17</b> 
        <br>
        Demo: <b>admin@helpdesk.com / Admin123</b>
      </div>

    </form>
  </div>
</div>
