<div class="dashboard-root" *ngIf="!loading">
  
  <header class="kpi-header">
    <div class="kpi-card" *ngFor="let item of kpis" [ngClass]="item.class">
      <mat-icon class="kpi-icon">{{ item.icon }}</mat-icon>
      <div class="kpi-info">
        <span class="label">{{ item.label }}</span>
        <span class="value">{{ item.value }}</span>
      </div>
    </div>
  </header>

  <main class="dashboard-grid">
    
    <section class="card chart-main">
      <div class="card-title">Tendencia de Tickets</div>
      <div class="chart-container" *ngIf="renderCharts">
        <canvas baseChart 
                [data]="lineChartData" 
                [options]="lineChartOptions" 
                [type]="'line'">
        </canvas>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Salud de SLA</div>
      <div class="chart-container pie" *ngIf="renderCharts">
        <canvas baseChart 
                [data]="slaChartData" 
                [options]="doughnutChartOptions" 
                [type]="'doughnut'">
        </canvas>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Prioridad</div>
      <div class="chart-container mini" *ngIf="renderCharts">
        <canvas baseChart 
                [data]="priorityChartData" 
                [options]="doughnutChartOptions" 
                [type]="'doughnut'">
        </canvas>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Categorías Populares</div>
      <div class="chart-container mini" *ngIf="renderCharts">
        <canvas baseChart 
                [data]="categoryChartData" 
                [options]="verticalBarChartOptions" 
                [type]="'bar'">
        </canvas>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Top Solicitantes</div>
      <div class="user-list">
        <div class="user-item" *ngFor="let item of topRequesters">
          <span class="avatar">{{ item.initial }}</span>
          <span class="name">{{ item.name }}</span>
          <span class="count">{{ item.solved }}</span>
        </div>
      </div>
    </section>

    <section class="card full-width">
      <div class="card-title">Tickets por Departamento</div>
      <div class="chart-container wide" *ngIf="renderCharts">
        <canvas baseChart 
                [data]="areaChartData" 
                [options]="barChartOptions" 
                [type]="'bar'">
        </canvas>
      </div>
    </section>

  </main>
</div>

<div class="loader-overlay" *ngIf="loading">
  <mat-icon class="spin">refresh</mat-icon>
  <span>Cargando métricas...</span>
</div>
